services:
  snmp-monitor:
    build: .
    container_name: snmp-monitor
    command: ["--host=host.docker.internal", "--community=public", "--interval=1"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  speedtest-cli:
    image: ghcr.io/sivel/speedtest-cli:latest
    container_name: speedtest-cli
    profiles: ["tools"]
